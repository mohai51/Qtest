<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regnons Card - Premium Eid Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary-red: #b30000;
            --gold: #d4af37;
            --night-sky: #050a1a;
            --cream-bg: #fcfaf2;
            --dark-blue: #001f4d;
            --hover-green: #e0f2f1;
            --dark-text: #2c2c2c;
        }

        body {
            background-color: var(--night-sky);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Hind Siliguri', sans-serif;
            overflow: hidden;
        }

        /* --- Background Animations --- */
        .firework-system { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .firework { position: absolute; bottom: 0; width: 4px; height: 4px; background: transparent; animation: shootAndBlast 5s infinite both; }
        @keyframes shootAndBlast {
            0% { transform: translateY(0); width: 4px; height: 4px; background: white; box-shadow: 0 0 10px white; }
            40% { transform: translateY(-70vh); width: 4px; height: 4px; background: white; opacity: 1; }
            45% { width: 2px; height: 2px; opacity: 1; box-shadow: 0 0 50px 30px white; }
            50% { width: 6px; height: 6px; opacity: 0; 
                box-shadow: -80px -80px 0 #ff0055, 80px -80px 0 #00ff55, -80px 80px 0 #0055ff, 80px 80px 0 #ffff00,
                            0px -120px 0 #ff00ff, 0px 120px 0 #00ffff, -120px 0px 0 #ff9900, 120px 0px 0 #ffffff; }
            100% { opacity: 0; transform: translateY(-70vh); }
        }

        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--duration) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        .moon { 
            position: absolute; top: 40px; right: 60px; width: 70px; height: 70px; 
            background: radial-gradient(circle at 30% 30%, #fff, #f4e185); 
            border-radius: 50%; z-index: 2; box-shadow: 0 0 50px rgba(244, 225, 133, 0.6); 
            animation: moonGlow 3s ease-in-out infinite;
        }
        @keyframes moonGlow { 0%, 100% { box-shadow: 0 0 50px rgba(244, 225, 133, 0.6); } 50% { box-shadow: 0 0 70px rgba(244, 225, 133, 0.9); } }
        
        .grass-field { position: absolute; bottom: 0; width: 100%; height: 90px; background: linear-gradient(to bottom, #3a7d32, #1a3a16); z-index: 3; }

        .running-animal { position: fixed; bottom: 20px; z-index: 4; width: 100px; height: auto; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); pointer-events: none; }
        .running-cow { animation: runCow 15s linear infinite; }
        .running-goat { animation: runGoat 12s linear infinite; animation-delay: -5s; }
        @keyframes runCow { 0% { left: -100px; transform: scaleX(1); } 49% { left: 110%; transform: scaleX(1); } 50% { left: 110%; transform: scaleX(-1); } 100% { left: -100px; transform: scaleX(-1); } }
        @keyframes runGoat { 0% { left: 110%; transform: scaleX(-1); } 49% { left: -100px; transform: scaleX(-1); } 50% { left: -100px; transform: scaleX(1); } 100% { left: 110%; transform: scaleX(1); } }

        .lantern-row { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 0 10px; z-index: 6; }
        .lantern { width: 18px; height: 26px; border-radius: 3px 3px 6px 6px; position: relative; animation: lanternSwing 4s ease-in-out infinite; transform-origin: top center; margin-top: 10px; }
        @keyframes lanternSwing { 0%,100% { transform: rotate(-15deg); } 50% { transform: rotate(15deg); } }

        .envelope-wrapper { position: relative; z-index: 10; cursor: pointer; animation: envelopeFloat 2s ease-in-out infinite; }
        .envelope {
            width: 360px; height: 240px; background-color: var(--cream-bg);
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 12px solid transparent;
            border-image: repeating-linear-gradient(-45deg, #b30000, #b30000 10px, #fcfaf2 10px, #fcfaf2 20px, #0044cc 20px, #0044cc 30px) 12;
        }
        @keyframes envelopeFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .card-box {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 450px; z-index: 20; opacity: 0; background-color: var(--cream-bg);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 5px solid var(--gold); border-radius: 15px;
        }
        .card-box.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }

        #pdfContent { padding: 35px 20px; text-align: center; background-color: var(--cream-bg); }
        .receiver-photo { width: 105px; height: 105px; border-radius: 50%; border: 3px solid var(--gold); margin: 0 auto 15px; overflow: hidden; position: relative;}
        .receiver-photo img { width: 100%; height: 100%; object-fit: cover; }
        .eid-mubarak { font-family: 'Great Vibes', cursive; color: var(--primary-red); font-size: 45px; margin: 10px 0; }
        .message-text { font-family: 'Hind Siliguri', sans-serif; font-weight: 700; font-size: 17px; background: rgba(212, 175, 55, 0.1); padding: 15px; border-radius: 12px; color: #444;}

        .btn-container { display: flex; flex-direction: column; padding-bottom: 20px; }
        .action-btn {
            width: 60%; margin: 5px auto; background: var(--dark-blue); color: white;
            border: #ff00d9 3px solid; border-radius: 10px; padding: 12px; cursor: pointer;
            font-weight: 700; transition: 0.3s; text-transform: uppercase;
        }
        .action-btn:hover { background-color: #01f780 !important; color: #001f4d !important; }

        .card-animals { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .mini-animal { width: 60px; height: auto; animation: jump 1.2s infinite ease-in-out; }
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    </style>
</head>

<body>

    <div class="firework-system">
        <div class="firework" style="left: 20%; animation-delay: 0.5s;"></div>
        <div class="firework" style="left: 80%; animation-delay: 1.2s;"></div>
    </div>

    <div class="stars" id="starsContainer"></div>
    <div class="lantern-row" id="lanternRow"></div>
    <div class="moon"></div>
    <div class="grass-field"></div>

    <img src="cow.png" class="running-animal running-cow" alt="Running Cow">
    <img src="goat.png" class="running-animal running-goat" alt="Running Goat">

    <div class="envelope-wrapper" id="env">
        <div class="envelope">
            <div style="text-align:center">
                <strong style="font-size: 1.2rem;">আপনার জন্য একটি বিশেষ কোরবানির চিঠি!</strong><br>
                <small>(খুলতে ক্লিক করুন)</small>
            </div>
        </div>
    </div>

    <div class="card-box" id="mainCard">
        <div id="pdfContent">
            <div class="receiver-photo">
                <img src="https://via.placeholder.com/105" alt="Photo" id="receiverImg" crossorigin="anonymous">
            </div>
            <h2 class="eid-mubarak">Eid Mubarak</h2>
            <div class="message-text">
                "প্রিয় বন্ধু, <br> পবিত্র কোরবানির এই আনন্দঘন মূহুর্তে আপনার জীবন ভরে উঠুক অনাবিল শান্তিতে। ত্যাগের মহিমায় উদ্ভাসিত হোক চারপাশ।"
            </div>
            <div class="card-animals">
                <div>
                    <img src="cow.png" class="mini-animal" alt="Cow">
                    <span style="display:block; font-size:12px; color:var(--primary-red); font-weight:bold;">হাম্বা!</span>
                </div>
                <div>
                    <img src="goat.png" class="mini-animal" style="animation-delay: 0.3s;" alt="Goat">
                    <span style="display:block; font-size:12px; color:var(--primary-red); font-weight:bold;">ম্যাঁ!</span>
                </div>
            </div>
            <p style="color: var(--gold); margin-top: 25px; font-weight: bold; font-size: 13px; letter-spacing: 2px;">REGNONS PREMIUM CARD</p>
        </div>

        <div class="btn-container">
            <button class="action-btn" onclick="downloadPDF()">কার্ডটি সেভ করুন</button>
            <button class="action-btn" style="background:#001635" onclick="window.location.reload()">নতুন কার্ড</button>
        </div>
    </div>

    <audio id="eidAudio" loop><source src="1.mp3" type="audio/mpeg"></audio>

    <script>
        // Stars & Lanterns Generation
        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 60; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            starsContainer.appendChild(star);
        }

        const lanternRow = document.getElementById('lanternRow');
        const lanternColors = ['#d4af37', '#b30000', '#0044cc'];
        for(let i = 0; i < 8; i++) {
            const lantern = document.createElement('div');
            lantern.className = 'lantern';
            lantern.style.background = lanternColors[i % 3];
            lantern.style.animationDelay = (i * 0.5) + 's';
            lanternRow.appendChild(lantern);
        }

        document.getElementById('env').addEventListener('click', function () {
            document.getElementById('eidAudio').play().catch(() => {});
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#d4af37', '#b30000', '#0044cc'] });
            this.style.display = 'none';
            document.getElementById('mainCard').classList.add('show');
        });

        // --- FINAL FIXED DOWNLOAD FUNCTION ---
        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const element = document.getElementById('pdfContent');
            const btnContainer = document.querySelector('.btn-container');

            btnContainer.style.display = 'none'; // হাইড বাটন
            window.scrollTo(0,0); // স্ক্রল রিসেট

            try {
                // ইমেজ লোড হওয়ার জন্য ছোট ডিলে
                await new Promise(resolve => setTimeout(resolve, 500));

                const canvas = await html2canvas(element, {
                    scale: 3, // হাই কোয়ালিটি
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: '#fcfaf2',
                    scrollX: 0,
                    scrollY: 0,
                    width: element.offsetWidth,
                    height: element.offsetHeight,
                    onclone: (clonedDoc) => {
                        // ক্লোন করা এলিমেন্ট যেন দৃশ্যমান থাকে
                        clonedDoc.getElementById('pdfContent').style.display = 'block';
                    }
                });

                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                const pdf = new jsPDF('p', 'mm', 'a4');
                
                const pageWidth = pdf.internal.pageSize.getWidth();
                const margin = 10;
                const imgWidth = pageWidth - (margin * 2);
                const imgHeight = (canvas.height * imgWidth) / canvas.width;

                pdf.addImage(imgData, 'JPEG', margin, margin, imgWidth, imgHeight);
                pdf.save('Regnons-Premium-Eid-Card.pdf');
                
                alert('✅ কার্ডটি সফলভাবে সেভ হয়েছে!');
            } catch (err) {
                console.error(err);
                alert('❌ সমস্যা হয়েছে! ইন্টারনেট কানেকশন বা ব্রাউজার চেক করুন।');
            } finally {
                btnContainer.style.display = 'flex'; // বাটন আবার দেখানো
            }
        }
    </script>
</body>
</html>
