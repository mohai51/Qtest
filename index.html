<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Cow: Qurbani Comics</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&family=Bangers&display=swap" rel="stylesheet">
    <style>
        :root {
            --marvel-red: #ed1d24;
            --marvel-blue: #004a99;
            --comic-yellow: #fef100;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: #111;
            color: #fff;
            margin: 0;
            overflow: hidden;
        }

        /* --- Stage 1: Input Page --- */
        #inputPage {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, var(--marvel-blue), #000);
        }

        .marvel-title {
            font-family: 'Bangers', cursive;
            font-size: 60px;
            color: white;
            background: var(--marvel-red);
            padding: 5px 25px;
            margin-bottom: 30px;
            border: 4px solid white;
            transform: skew(-10deg);
            box-shadow: 8px 8px 0px #000;
        }

        .input-box {
            padding: 15px;
            width: 280px;
            border: 4px solid #000;
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: bold;
            outline: none;
        }

        .btn-gen {
            background: var(--comic-yellow);
            color: #000;
            padding: 15px 40px;
            border: 4px solid #000;
            font-weight: 900;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 5px 5px 0px var(--marvel-red);
            font-family: 'Bangers', cursive;
            letter-spacing: 1px;
        }

        /* --- Stage 2: Loading Screen --- */
        #loadingScreen {
            display: none;
            height: 100vh;
            background: #000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .cow-runner {
            font-size: 100px;
            position: relative;
            animation: run 1s infinite alternate ease-in-out;
        }

        @keyframes run {
            from { transform: translateX(-50px) scaleX(1); }
            to { transform: translateX(50px) scaleX(-1); }
        }

        .progress-bar {
            width: 80%;
            max-width: 400px;
            height: 25px;
            background: #333;
            border: 3px solid #fff;
            margin-top: 30px;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--marvel-red);
            width: 0%;
            transition: 0.2s linear;
        }

        /* --- Stage 3: Comic Page --- */
        #comicPage {
            display: none;
            height: 100vh;
            background: url('https://www.transparenttextures.com/patterns/comic-book.png'), #ddd;
            color: #000;
            position: relative;
        }

        .comic-container {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .comic-panel {
            background: white;
            border: 6px solid #000;
            width: 100%;
            max-width: 500px;
            min-height: 450px;
            padding: 25px;
            position: relative;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.3);
            background-image: radial-gradient(#bbb 0.5px, transparent 0.5px);
            background-size: 10px 10px;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--marvel-red);
            color: white;
            border: 4px solid black;
            width: 55px;
            height: 55px;
            font-size: 25px;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            transition: 0.2s;
        }
        .nav-btn:active { transform: translateY(-50%) scale(0.9); }
        .nav-btn:disabled { background: #666; cursor: not-allowed; }

        .nav-left { left: 15px; }
        .nav-right { right: 15px; }

        .scene-text {
            background: var(--comic-yellow);
            border: 3px solid black;
            padding: 12px;
            font-weight: bold;
            margin: 15px 0;
            font-style: italic;
        }

        .bubble {
            background: white;
            border: 3px solid black;
            border-radius: 25px;
            padding: 15px;
            position: relative;
            font-weight: 700;
            font-size: 18px;
            min-height: 60px;
            display: flex;
            align-items: center;
            box-shadow: 5px 5px 0px #eee;
        }

        .bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 30px;
            border-width: 15px 15px 0 0;
            border-style: solid;
            border-color: black transparent transparent transparent;
        }

        .super-cow-label {
            position: absolute;
            top: -20px;
            left: 20px;
            background: black;
            color: white;
            padding: 5px 15px;
            font-family: 'Bangers';
            transform: rotate(-3deg);
        }
    </style>
</head>
<body>

    <!-- Stage 1 -->
    <div id="inputPage">
        <div class="marvel-title">MARVEL COW</div>
        <input type="text" id="userName" class="input-box" placeholder="আপনার নাম">
        <input type="text" id="partnerName" class="input-box" placeholder="বন্ধুর নাম">
        <button class="btn-gen" onclick="startGeneration()">GENERATE COMIC ⚡</button>
    </div>

    <!-- Stage 2 -->
    <div id="loadingScreen">
        <div class="cow-runner">🐮🚀</div>
        <div class="progress-bar">
            <div id="fill" class="progress-fill"></div>
        </div>
        <h2 id="percentText" style="font-family: 'Bangers';">0%</h2>
        <p style="font-weight: bold; letter-spacing: 1px;">SUPER COW IS RUNNING...</p>
    </div>

    <!-- Stage 3 -->
    <div id="comicPage">
        <button id="prevBtn" class="nav-btn nav-left" onclick="prevPage()">◀</button>
        <button id="nextBtn" class="nav-btn nav-right" onclick="nextPage()">▶</button>
        
        <div class="comic-container">
            <div id="activePanel" class="comic-panel"></div>
        </div>
    </div>

<script>
    const API_KEY = "AIzaSyCK1SxZXfrGDtw40CBTwss_we2tlWm7uAQ";
    let storyData = [];
    let currentPage = 0;

    async function startGeneration() {
        const user = document.getElementById('userName').value;
        const partner = document.getElementById('partnerName').value;
        if (!user || !partner) return alert("দয়া করে নামগুলো লিখুন!");

        document.getElementById('inputPage').style.display = 'none';
        document.getElementById('loadingScreen').style.display = 'flex';

        // প্রোগ্রেস বার এনিমেশন
        let progress = 0;
        const interval = setInterval(() => {
            if (progress < 95) {
                progress += Math.random() * 5;
                updateLoading(progress);
            }
        }, 300);

        // আরও শক্তিশালী প্রম্পট
        const prompt = `Create a 5-Page Funny Superhero Comic Script.
        Theme: Marvel Comics Style, Superhero Cow vs Qurbani Haat.
        Characters: ${user} (Hero) and ${partner} (Sidekick).
        Language: Bengali.
        
        Format (Strictly follow for 5 pages):
        Page [Number] | Title | Scene | Dialogue
        
        Make it very funny. Use '|' as the only separator. Ensure 5 distinct pages.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            const text = data.candidates[0].content.parts[0].text;
            
            // ডাটা প্রসেসিং (উন্নত Regex)
            storyData = text.split(/Page \d+|Page\d+|পৃষ্ঠা \d+|পৃষ্ঠা\d+/i)
                            .map(p => p.trim())
                            .filter(p => p.length > 15);

            progress = 100;
            updateLoading(100);
            clearInterval(interval);

            setTimeout(() => {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('comicPage').style.display = 'block';
                renderPage();
            }, 1000);

        } catch (e) {
            alert("Connection Error! Please check your API key.");
            location.reload();
        }
    }

    function updateLoading(value) {
        document.getElementById('fill').style.width = value + '%';
        document.getElementById('percentText').innerText = Math.floor(value) + '%';
    }

    function renderPage() {
        const panel = document.getElementById('activePanel');
        const content = storyData[currentPage] || "গল্প লোড হতে সমস্যা হয়েছে|দুঃখিত|আবার চেষ্টা করুন";
        const parts = content.split('|');
        
        panel.innerHTML = `
            <div class="super-cow-label">PANEL #${currentPage + 1}</div>
            <h2 style="font-family: 'Bangers'; border-bottom: 5px solid var(--marvel-red); margin-top: 10px; font-size: 28px;">${parts[0] || 'SUPER COW'}</h2>
            <div class="scene-text">🎬 ${parts[1] || 'দৃশ্যপট তৈরি হচ্ছে...'}</div>
            <div class="bubble">🗨️ ${parts[2] || 'কথা বলছে...'}</div>
            <div style="margin-top: 25px; font-weight: 900; text-align: center; border-top: 2px dashed #000; padding-top: 10px;">
                PAGE ${currentPage + 1} / ${storyData.length}
            </div>
        `;

        // বাটন কন্ট্রোল
        document.getElementById('prevBtn').disabled = (currentPage === 0);
        document.getElementById('nextBtn').disabled = (currentPage === storyData.length - 1);
    }

    function nextPage() {
        if (currentPage < storyData.length - 1) {
            currentPage++;
            renderPage();
        }
    }

    function prevPage() {
        if (currentPage > 0) {
            currentPage--;
            renderPage();
        }
    }
</script>

</body>
</html>
